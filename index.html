<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trainingsplan Block 1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;
  --text:#f0ece4;--muted:#666;--accent:#c8f060;--accent-dim:rgba(200,240,96,0.12);
  --red:#ff6b6b;--blue:#60b4f0;--amber:#f0c060;--pink:#f060b4;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;}

/* HEADER */
header{padding:16px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.96);backdrop-filter:blur(10px);}
header h1{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
header p{font-size:11px;color:var(--muted);}
.progress-bar{height:2px;background:var(--border);margin-top:10px;border-radius:2px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;width:0%;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,0.97);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.bottom-nav button{flex:1;padding:12px 4px 10px;background:transparent;border:none;color:var(--muted);font-size:10px;font-family:'DM Mono',monospace;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;}
.bottom-nav button.active{color:var(--accent);}
.bottom-nav button svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;}

/* VIEWS */
.view{display:none;padding:0 0 20px;}
.view.active{display:block;}

/* WEEK NAV */
.week-nav{display:flex;overflow-x:auto;gap:6px;padding:12px 16px;scrollbar-width:none;border-bottom:1px solid var(--border);}
.week-nav::-webkit-scrollbar{display:none;}
.week-btn{flex-shrink:0;font-family:'DM Mono',monospace;font-size:11px;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;}
.week-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.week-btn.has-zyklus{border-color:var(--red);color:var(--red);}
.week-btn.has-zyklus.active{background:rgba(255,107,107,.12);}
.week-btn.wdone{opacity:.5;}

/* WEEK PANEL */
.week-panel{display:none;padding:16px;}
.week-panel.active{display:block;}
.week-title{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;margin-bottom:2px;}
.week-date{font-size:12px;color:var(--muted);margin-bottom:4px;}
.week-zyklus{font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:8px;}
.zyklus-note{padding:8px 12px;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25);border-radius:8px;font-size:12px;color:#ff9999;line-height:1.4;margin-bottom:12px;}

/* DAY TABS */
.day-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;font-size:12px;font-weight:500;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s;text-align:center;line-height:1.3;}
.day-tab.active{background:var(--surface2);border-color:#444;color:var(--text);}
.day-tab.done{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.day-content{display:none;}
.day-content.active{display:block;}

/* WARMUP */
.warmup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:11px;font-size:12px;color:var(--muted);line-height:1.5;}
.warmup-card strong{color:var(--blue);font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px;}

/* EXERCISE CARD */
.exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:9px;overflow:hidden;transition:border-color .2s;}
.exercise-card.completed{border-color:var(--accent);}
.exercise-header{display:flex;align-items:flex-start;gap:9px;padding:11px 13px 8px;}
.pattern-chip{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;}
.chip-compound{background:rgba(200,240,96,.15);color:var(--accent);border:1px solid rgba(200,240,96,.3);}
.chip-accessory{background:rgba(102,102,102,.2);color:#888;border:1px solid var(--border);}
.exercise-info{flex:1;}
.exercise-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.2;margin-bottom:2px;}
.exercise-detail{font-size:11px;color:var(--muted);line-height:1.3;}

/* SETS WITH WEIGHT */
.sets-container{padding:0 13px 12px;}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.set-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-user-select:none;user-select:none;}
.set-btn:active{transform:scale(.9);}
.set-btn.done{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-size:16px;}
.set-label-mini{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;width:22px;}
.weight-input-wrap{flex:1;display:flex;align-items:center;gap:5px;}
.weight-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:8px 10px;text-align:right;min-width:0;-webkit-appearance:none;appearance:none;}
.weight-input:focus{outline:none;border-color:#555;}
.weight-input::placeholder{color:var(--muted);}
.weight-unit{font-size:11px;color:var(--muted);flex-shrink:0;}
.weight-note{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 10px;min-width:0;-webkit-appearance:none;appearance:none;}
.weight-note:focus{outline:none;border-color:#555;}
.weight-note::placeholder{color:var(--muted);}

/* FINISHER */
.finisher-card{background:rgba(200,240,96,.06);border:1px solid rgba(200,240,96,.2);border-radius:var(--radius);padding:11px 13px;margin-top:4px;display:flex;align-items:center;gap:10px;}
.finisher-card .flabel{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:3px;}
.finisher-card .fname{font-size:13px;font-weight:500;color:var(--text);}
.finisher-check{width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(200,240,96,.3);background:transparent;color:var(--accent);font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-left:auto;}
.finisher-check.done{background:var(--accent-dim);border-color:var(--accent);}
.finisher-check:active{transform:scale(.9);}

/* DONE BANNER */
.day-done-banner{display:none;background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius);padding:13px;margin-top:11px;text-align:center;font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:.05em;}
.day-done-banner.show{display:block;}
.reset-btn{display:block;width:100%;margin-top:9px;padding:10px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;text-align:center;}
.reset-btn:active{opacity:.6;}
.nav-arrows{display:flex;gap:8px;margin-top:18px;}
.nav-arrows button{flex:1;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;}
.nav-arrows button.primary{border-color:#444;color:var(--text);}
.nav-arrows button:disabled{opacity:.3;}

/* LOGBUCH */
#view-log{padding:16px;}
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.log-header h2{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;}
.export-btn{font-family:'DM Mono',monospace;font-size:11px;padding:7px 14px;border-radius:20px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);cursor:pointer;}
.log-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 20px;line-height:1.6;}
.log-week{margin-bottom:20px;}
.log-week-title{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.log-day{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.log-day-header{padding:10px 13px;background:var(--surface2);font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center;}
.log-day-date{font-size:11px;color:var(--muted);}
.log-exercise{padding:8px 13px;border-top:1px solid var(--border);}
.log-ex-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;}
.log-sets{display:flex;flex-wrap:wrap;gap:5px;}
.log-set-pill{font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
.log-set-pill.has-weight{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.log-set-pill.done-no-weight{border-color:#444;color:#888;}

/* PRINT / PDF styles */
@media print{
  body{background:#fff;color:#000;padding-bottom:0;}
  header,#view-plan,#view-log .log-header .export-btn,.bottom-nav,.nav-arrows,.reset-btn{display:none!important;}
  #view-log{display:block!important;padding:0;}
  .log-week-title{color:#333;border-bottom:1px solid #ccc;}
  .log-day{border:1px solid #ccc;background:#fff;}
  .log-day-header{background:#f5f5f5;}
  .log-set-pill{border-color:#ccc;color:#333;}
  .log-set-pill.has-weight{border-color:#333;color:#333;background:#f0f0f0;}
  .log-exercise{border-top:1px solid #eee;}
}
</style>
</head>

</nav>

// --- STATE HELPERS ---
function sk(wi,di,ei,si){return`tp2_w${wi}d${di}e${ei}s${si}`;}
function fk(wi,di){return`tp2_w${wi}d${di}fin`;}
function wk(wi,di,ei,si){return`tp2_w${wi}d${di}e${ei}s${si}_wt`;}
function nk(wi,di,ei,si){return`tp2_w${wi}d${di}e${ei}s${si}_nt`;}
function sv(k,v){try{if(v===null||v==='')localStorage.removeItem(k);else localStorage.setItem(k,v);}catch(e){}}
function lv(k){try{return localStorage.getItem(k)||'';}catch(e){return '';}}
function sb(k,v){try{localStorage.setItem(k,v?'1':'0');}catch(e){}}
function lb(k){try{return localStorage.getItem(k)==='1';}catch(e){return false;}}

let curWeek=0,curDay=new Array(9).fill(0),curView='plan';

function switchView(v){
  curView=v;
  document.getElementById('view-plan').classList.toggle('active',v==='plan');
  document.getElementById('view-log').classList.toggle('active',v==='log');
  document.getElementById('nav-plan').classList.toggle('active',v==='plan');
  document.getElementById('nav-log').classList.toggle('active',v==='log');
  if(v==='log') renderLog();
}

// --- GLOBAL PROGRESS ---
function countDayChecks(wi,di){
  const day=DATA[wi].days[di];
  let total=0,done=0;
  day.exercises.forEach((ex,ei)=>{for(let si=0;si<ex.sets;si++){total++;if(lb(sk(wi,di,ei,si)))done++;}});
  total++;if(lb(fk(wi,di)))done++;
  return{total,done};
}
function updateGlobalProgress(){
  let t=0,d=0;
  DATA.forEach((_,wi)=>DATA[wi].days.forEach((_,di)=>{const c=countDayChecks(wi,di);t+=c.total;d+=c.done;}));
  const p=t?Math.round(d/t*100):0;
  document.getElementById('global-bar').style.width=p+'%';
  document.getElementById('global-progress-text').textContent=`${d} von ${t} Sätzen erledigt · ${p}% Block 1`;
}

// --- WEEK NAV ---
function renderWeekNav(){
  const nav=document.getElementById('week-nav');nav.innerHTML='';
  DATA.forEach((w,wi)=>{
    const btn=document.createElement('button');
    btn.className='week-btn'+(w.zyklusNote?' has-zyklus':'')+(wi===curWeek?' active':'');
    btn.textContent=`Wo. ${w.week}`;
    btn.onclick=()=>{curWeek=wi;renderWeek();scrollTo(0,0);};
    nav.appendChild(btn);
  });
}

// --- RENDER WEEK ---
function renderWeek(){
  renderWeekNav();
  const container=document.getElementById('week-panels');container.innerHTML='';
  const w=DATA[curWeek];const wi=curWeek;
  const panel=document.createElement('div');panel.className='week-panel active';

  let html=`<div class="week-title">Woche ${w.week}</div><div class="week-date">${w.dates}</div><div class="week-zyklus">${w.zyklus}</div>`;
  if(w.zyklusNote)html+=`<div class="zyklus-note">${w.zyklusNote}</div>`;

  // Day tabs
  html+=`<div class="day-tabs" id="dtabs-${wi}">`;
  w.days.forEach((d,di)=>{
    const{total,done}=countDayChecks(wi,di);
    const isDone=done===total;
    html+=`<button class="day-tab${di===curDay[wi]?' active':''}${isDone?' done':''}" onclick="switchDay(${wi},${di})">${d.label}<br><span style="font-weight:300;font-size:10px;">${d.sub}</span></button>`;
  });
  html+=`</div>`;

  // Day contents
  w.days.forEach((d,di)=>{
    const{total,done}=countDayChecks(wi,di);
    const allDone=done===total;
    html+=`<div class="day-content${di===curDay[wi]?' active':''}" id="dc-${wi}-${di}">`;
    html+=`<div class="warmup-card"><strong>Aufwärmen</strong>${d.warmup}</div>`;

    d.exercises.forEach((ex,ei)=>{
      const allSetsDone=Array.from({length:ex.sets},(_,si)=>lb(sk(wi,di,ei,si))).every(Boolean);
      html+=`<div class="exercise-card${allSetsDone?' completed':''}" id="exc-${wi}-${di}-${ei}">
        <div class="exercise-header">
          <div class="pattern-chip ${ex.compound?'chip-compound':'chip-accessory'}">${ex.pat}</div>
          <div class="exercise-info">
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-detail">${ex.detail}</div>
          </div>
        </div>
        <div class="sets-container">`;
      for(let si=0;si<ex.sets;si++){
        const done=lb(sk(wi,di,ei,si));
        const wtVal=lv(wk(wi,di,ei,si));
        const ntVal=lv(nk(wi,di,ei,si));
        html+=`<div class="set-row">
          <span class="set-label-mini">S${si+1}</span>
          <button class="set-btn${done?' done':''}" id="sb-${wi}-${di}-${ei}-${si}" onclick="toggleSet(${wi},${di},${ei},${si})">${done?'✓':'○'}</button>
          <div class="weight-input-wrap">
            <input class="weight-input" type="number" inputmode="decimal" min="0" step="0.5"
              placeholder="—" value="${wtVal}"
              id="wi-${wi}-${di}-${ei}-${si}"
              onchange="saveWeight(${wi},${di},${ei},${si},this.value)"
              onfocus="this.select()">
            <span class="weight-unit">kg</span>
            <input class="weight-note" type="text" placeholder="Notiz…" value="${ntVal}"
              id="ni-${wi}-${di}-${ei}-${si}"
              onchange="saveNote(${wi},${di},${ei},${si},this.value)">
          </div>
        </div>`;
      }
      html+=`</div></div>`;
    });

    // Finisher
    const finDone=lb(fk(wi,di));
    html+=`<div class="finisher-card" id="fin-${wi}-${di}">
      <div><div class="flabel">Finisher</div><div class="fname">${d.finisher}</div></div>
      <button class="finisher-check${finDone?' done':''}" id="finbtn-${wi}-${di}" onclick="toggleFin(${wi},${di})">${finDone?'✓':'○'}</button>
    </div>`;

    html+=`<div class="day-done-banner${allDone?' show':''}" id="ddb-${wi}-${di}">Training abgeschlossen ✓</div>`;
    html+=`<button class="reset-btn" onclick="resetDay(${wi},${di})">Tag zurücksetzen</button>`;
    html+=`</div>`;
  });

  html+=`<div class="nav-arrows">`;
  html+=wi>0?`<button onclick="curWeek=${wi-1};renderWeek();scrollTo(0,0);">← Woche ${wi}</button>`:`<button disabled>← zurück</button>`;
  html+=wi<DATA.length-1?`<button class="primary" onclick="curWeek=${wi+1};renderWeek();scrollTo(0,0);">Woche ${wi+2} →</button>`:`<button disabled>weiter →</button>`;
  html+=`</div>`;

  panel.innerHTML=html;
  container.appendChild(panel);
  updateGlobalProgress();
}

// --- INTERACTIONS ---
function switchDay(wi,di){
  curDay[wi]=di;
  document.querySelectorAll(`#dtabs-${wi} .day-tab`).forEach((t,i)=>t.classList.toggle('active',i===di));
  document.querySelectorAll(`[id^="dc-${wi}-"]`).forEach(el=>el.classList.remove('active'));
  const dc=document.getElementById(`dc-${wi}-${di}`);if(dc)dc.classList.add('active');
}

function toggleSet(wi,di,ei,si){
  const k=sk(wi,di,ei,si);const nv=!lb(k);sb(k,nv);
  const btn=document.getElementById(`sb-${wi}-${di}-${ei}-${si}`);
  if(btn){btn.className='set-btn'+(nv?' done':'');btn.textContent=nv?'✓':'○';}
  const allDone=Array.from({length:DATA[wi].days[di].exercises[ei].sets},(_,s)=>lb(sk(wi,di,ei,s))).every(Boolean);
  const card=document.getElementById(`exc-${wi}-${di}-${ei}`);if(card)card.classList.toggle('completed',allDone);
  checkDayDone(wi,di);updateGlobalProgress();renderWeekNav();
}

function saveWeight(wi,di,ei,si,val){sv(wk(wi,di,ei,si),val);}
function saveNote(wi,di,ei,si,val){sv(nk(wi,di,ei,si),val);}

function toggleFin(wi,di){
  const k=fk(wi,di);const nv=!lb(k);sb(k,nv);
  const btn=document.getElementById(`finbtn-${wi}-${di}`);
  if(btn){btn.className='finisher-check'+(nv?' done':'');btn.textContent=nv?'✓':'○';}
  checkDayDone(wi,di);updateGlobalProgress();renderWeekNav();
}

function checkDayDone(wi,di){
  const{total,done}=countDayChecks(wi,di);const allDone=done===total;
  const banner=document.getElementById(`ddb-${wi}-${di}`);if(banner)banner.classList.toggle('show',allDone);
  const tabs=document.querySelectorAll(`#dtabs-${wi} .day-tab`);if(tabs[di])tabs[di].classList.toggle('done',allDone);
}

function resetDay(wi,di){
  const day=DATA[wi].days[di];
  day.exercises.forEach((ex,ei)=>{
    for(let si=0;si<ex.sets;si++){
      sb(sk(wi,di,ei,si),false);
      const btn=document.getElementById(`sb-${wi}-${di}-${ei}-${si}`);
      if(btn){btn.className='set-btn';btn.textContent='○';}
      const card=document.getElementById(`exc-${wi}-${di}-${ei}`);if(card)card.classList.remove('completed');
    }
  });
  sb(fk(wi,di),false);
  const fb=document.getElementById(`finbtn-${wi}-${di}`);if(fb){fb.className='finisher-check';fb.textContent='○';}
  const banner=document.getElementById(`ddb-${wi}-${di}`);if(banner)banner.classList.remove('show');
  const tabs=document.querySelectorAll(`#dtabs-${wi} .day-tab`);if(tabs[di])tabs[di].classList.remove('done');
  updateGlobalProgress();renderWeekNav();
}

// --- LOGBUCH ---
function renderLog(){
  const container=document.getElementById('log-content');container.innerHTML='';
  let hasData=false;
  DATA.forEach((w,wi)=>{
    let weekHtml='';
    let weekHasData=false;
    w.days.forEach((d,di)=>{
      const{total,done}=countDayChecks(wi,di);
      if(done===0)return;
      weekHasData=true;hasData=true;
      const pct=Math.round(done/total*100);
      weekHtml+=`<div class="log-day">
        <div class="log-day-header"><span>${d.label} · ${d.sub}</span><span class="log-day-date">${pct}% fertig</span></div>`;
      d.exercises.forEach((ex,ei)=>{
        const sets=[];
        let anyDone=false;
        for(let si=0;si<ex.sets;si++){
          const done=lb(sk(wi,di,ei,si));
          const wt=lv(wk(wi,di,ei,si));
          const nt=lv(nk(wi,di,ei,si));
          if(done||wt||nt){anyDone=true;}
          if(done||wt){
            let label=`S${si+1}`;
            if(wt)label+=` · ${wt} kg`;
            if(nt)label+=` · ${nt}`;
            sets.push({label,hasWeight:!!wt,done});
          }
        }
        if(!anyDone)return;
        weekHtml+=`<div class="log-exercise">
          <div class="log-ex-name">${ex.name}</div>
          <div class="log-sets">`;
        sets.forEach(s=>{
          const cls=s.hasWeight?'has-weight':s.done?'done-no-weight':'';
          weekHtml+=`<span class="log-set-pill ${cls}">${s.label}</span>`;
        });
        weekHtml+=`</div></div>`;
      });
      // Finisher
      const finDone=lb(fk(wi,di));
      if(finDone){weekHtml+=`<div class="log-exercise"><div class="log-ex-name" style="color:var(--accent)">✓ Finisher: ${d.finisher}</div></div>`;}
      weekHtml+=`</div>`;
    });
    if(weekHasData){
      container.innerHTML+=`<div class="log-week"><div class="log-week-title">Woche ${w.week} · ${w.dates}</div>${weekHtml}</div>`;
    }
  });
  if(!hasData){
    container.innerHTML=`<div class="log-empty">Noch keine Trainings abgeschlossen.<br>Hake im Training deine Sätze ab – sie erscheinen dann hier.</div>`;
  }
}

function printLog(){
  // Switch to log view for print, then restore
  const allViews=document.querySelectorAll('.view');
  allViews.forEach(v=>v.style.display='none');
  document.getElementById('view-log').style.display='block';
  window.print();
  allViews.forEach(v=>v.style.display='');
  switchView('log');
}

// INIT
renderWeek();
updateGlobalProgress();
</script>
</body>
</html>
