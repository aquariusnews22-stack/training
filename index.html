<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Training · Block 1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
/* ===== CSS VARIABLEN ===== */
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;
  --text:#f0ece4;--muted:#666;--muted2:#888;
  --accent:#c8f060;--accent-dim:rgba(200,240,96,0.12);--accent-border:rgba(200,240,96,0.3);
  --red:#ff6b6b;--red-dim:rgba(255,107,107,0.1);--red-border:rgba(255,107,107,0.3);
  --blue:#60b4f0;--blue-dim:rgba(96,180,240,0.1);
  --amber:#f0c060;--amber-dim:rgba(240,192,96,0.1);
  --purple:#b060f0;--purple-dim:rgba(176,96,240,0.1);--purple-border:rgba(176,96,240,0.3);
  --teal:#60f0d0;--teal-dim:rgba(96,240,208,0.1);
  --radius:12px;--radius-sm:8px;
}
/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
input,textarea,select{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;width:100%;-webkit-appearance:none;appearance:none;}
input:focus,textarea:focus,select:focus{outline:none;border-color:#555;}
input::placeholder,textarea::placeholder{color:var(--muted);}
textarea{resize:vertical;min-height:60px;}
select option{background:var(--surface2);}
button{cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ===== HEADER ===== */
header{padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.96);backdrop-filter:blur(10px);}
header h1{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
header p{font-size:11px;color:var(--muted);}
.progress-bar{height:2px;background:var(--border);margin-top:10px;border-radius:2px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;width:0%;}

/* ===== BOTTOM NAV ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,0.97);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px);}
.bottom-nav button{flex:1;padding:10px 2px 8px;background:transparent;border:none;color:var(--muted);font-size:9px;font-family:'DM Mono',monospace;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;}
.bottom-nav button.active{color:var(--accent);}
.bottom-nav button svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;}

/* ===== VIEWS ===== */
.view{display:none;}
.view.active{display:block;}

/* ===== WEEK NAV ===== */
.week-nav{display:flex;overflow-x:auto;gap:6px;padding:12px 16px;scrollbar-width:none;border-bottom:1px solid var(--border);}
.week-nav::-webkit-scrollbar{display:none;}
.week-btn{flex-shrink:0;font-family:'DM Mono',monospace;font-size:11px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;transition:all .2s;}
.week-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.week-btn.has-zyklus{border-color:var(--red);color:var(--red);}
.week-btn.has-zyklus.active{background:var(--red-dim);}

/* ===== WEEK PANEL ===== */
.week-panel{display:none;padding:14px 16px;}
.week-panel.active{display:block;}
.week-title{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;margin-bottom:2px;}
.week-meta{font-size:12px;color:var(--muted);margin-bottom:4px;}
.week-zyklus{font-size:12px;color:var(--muted);line-height:1.4;margin-bottom:8px;}
.zyklus-note{padding:8px 12px;background:var(--red-dim);border:1px solid var(--red-border);border-radius:var(--radius-sm);font-size:12px;color:#ff9999;line-height:1.5;margin-bottom:12px;}
.luteal-note{padding:8px 12px;background:var(--amber-dim);border:1px solid rgba(240,192,96,0.3);border-radius:var(--radius-sm);font-size:12px;color:var(--amber);line-height:1.5;margin-bottom:12px;}

/* ===== DAY TABS ===== */
.day-tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;font-size:11px;font-weight:500;padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--muted);text-align:center;line-height:1.3;transition:all .2s;}
.day-tab.active{background:var(--surface2);border-color:#444;color:var(--text);}
.day-tab.done{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.day-tab.hiit-tab{border-color:var(--red-border);color:var(--red);}
.day-tab.hiit-tab.active{background:var(--red-dim);}
.day-content{display:none;}
.day-content.active{display:block;}

/* ===== DATUMS-HEADER ===== */
.day-date-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.day-date-label{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--text);}
.date-input{flex:1;max-width:160px;font-family:'DM Mono',monospace;font-size:12px;padding:6px 10px;color:var(--muted2);border-color:var(--border);}
.date-input:focus{color:var(--text);}

/* ===== WARMUP ===== */
.warmup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0;margin-bottom:11px;overflow:hidden;}
.warmup-top{padding:11px 13px 8px;border-bottom:1px solid var(--border);}
.warmup-cardio-row{display:flex;align-items:center;gap:8px;padding:10px 13px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
.warmup-cardio-row select{flex:1;min-width:0;font-size:12px;padding:7px 9px;background:var(--surface2);}
.warmup-cardio-row input{width:72px;flex:0 0 72px;font-size:12px;padding:7px 9px;text-align:right;}
.warmup-cardio-row .wunit{font-size:11px;color:var(--muted);flex-shrink:0;}
.warmup-cardio-check{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--blue-dim);background:transparent;color:var(--blue);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.warmup-cardio-check:active{transform:scale(.88);}
.warmup-cardio-check.done{background:var(--blue-dim);border-color:var(--blue);}
.warmup-extra-row{display:flex;align-items:center;gap:10px;padding:9px 13px;}
.warmup-extra-check{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.warmup-extra-check:active{transform:scale(.88);}
.warmup-extra-check.done{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.warmup-extra-text{font-size:12px;color:var(--muted);flex:1;line-height:1.4;}
.card-label{color:var(--blue);font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:3px;}

/* ===== EXERCISE CARD ===== */
.exercise-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:9px;overflow:hidden;transition:border-color .2s;}
.exercise-card.completed{border-color:var(--accent);}
.exercise-header{display:flex;align-items:flex-start;gap:9px;padding:11px 13px 6px;}
.pattern-chip{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px;}
.chip-compound{background:rgba(200,240,96,.15);color:var(--accent);border:1px solid var(--accent-border);}
.chip-accessory{background:rgba(102,102,102,.2);color:#888;border:1px solid var(--border);}
.exercise-info{flex:1;}
.exercise-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.2;margin-bottom:2px;}
.exercise-detail{font-size:11px;color:var(--muted);line-height:1.3;}
.progress-indicator{font-size:10px;color:var(--accent);font-family:'DM Mono',monospace;margin-top:3px;}

/* ===== SETS ===== */
.sets-container{padding:0 13px 10px;}
.set-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.set-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-user-select:none;user-select:none;}
.set-btn:active{transform:scale(.88);}
.set-btn.done{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-size:15px;}
.set-label-mini{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;width:20px;}
.weight-wrap{flex:1;display:flex;align-items:center;gap:5px;}
.weight-input{flex:0 0 70px;text-align:right;font-family:'DM Mono',monospace;font-size:13px;padding:7px 8px;}
.weight-unit{font-size:11px;color:var(--muted);flex-shrink:0;}
.weight-note{flex:1;font-size:12px;padding:7px 9px;}

/* ===== FINISHER ===== */
.finisher-card{background:rgba(200,240,96,.06);border:1px solid var(--accent-border);border-radius:var(--radius);padding:11px 13px;margin-top:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.finisher-info{flex:1;min-width:0;}
.finisher-card .flabel{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:3px;}
.finisher-card .fname{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;}
.finisher-fields{display:flex;gap:6px;width:100%;margin-top:4px;}
.finisher-fields input{font-size:12px;padding:6px 8px;}
.finisher-check{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--accent-border);background:transparent;color:var(--accent);font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-left:auto;}
.finisher-check.done{background:var(--accent-dim);border-color:var(--accent);}
.finisher-check:active{transform:scale(.9);}

/* ===== STRETCHING ===== */
.stretch-section{margin-top:14px;background:var(--teal-dim);border:1px solid rgba(96,240,208,0.2);border-radius:var(--radius);overflow:hidden;}
.stretch-header{padding:10px 13px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.stretch-header-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--teal);}
.stretch-toggle{font-size:18px;color:var(--teal);transition:transform .2s;}
.stretch-toggle.open{transform:rotate(180deg);}
.stretch-body{display:none;padding:0 13px 12px;}
.stretch-body.open{display:block;}
.stretch-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(96,240,208,0.1);}
.stretch-item:last-child{border-bottom:none;}
.stretch-check{width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(96,240,208,0.3);background:transparent;color:var(--teal);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.stretch-check:active{transform:scale(.88);}
.stretch-check.done{background:var(--teal-dim);border-color:var(--teal);}
.stretch-info{flex:1;}
.stretch-name{font-size:13px;font-weight:500;color:var(--text);}
.stretch-dur{font-size:11px;color:var(--muted);}.stretch-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5;font-style:italic;}

/* ===== DONE BANNER ===== */
.day-done-banner{display:none;background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius);padding:12px;margin-top:12px;text-align:center;font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:.05em;}
.day-done-banner.show{display:block;}
.reset-btn{display:block;width:100%;margin-top:8px;padding:9px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;text-align:center;}
.nav-arrows{display:flex;gap:8px;margin-top:16px;}
.nav-arrows button{flex:1;padding:11px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;}
.nav-arrows button.primary{border-color:#444;color:var(--text);}
.nav-arrows button:disabled{opacity:.3;}

/* ===== HIIT TAB ===== */
.hiit-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.hiit-note-optional{padding:8px 12px;background:var(--amber-dim);border:1px solid rgba(240,192,96,0.25);border-radius:var(--radius-sm);font-size:12px;color:var(--amber);margin-bottom:12px;line-height:1.4;}
.hiit-device-row{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.hiit-device-row label{font-size:12px;color:var(--muted);flex-shrink:0;}
.hiit-device-row select{flex:1;font-size:12px;padding:7px 10px;}
.hiit-round{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;}
.hiit-round-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.hiit-round-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--red);font-weight:500;}
.hiit-timer-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--red-border);background:transparent;color:var(--red);font-family:'DM Mono',monospace;font-size:12px;transition:all .2s;}
.hiit-timer-btn.running{background:var(--red-dim);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.hiit-timer-display{font-family:'DM Mono',monospace;font-size:18px;color:var(--red);margin-left:auto;}
.hiit-round-fields{display:flex;gap:6px;margin-top:8px;}
.hiit-round-fields input{font-size:12px;padding:6px 9px;}
.hiit-round-check{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--red-border);background:transparent;color:var(--red);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-left:auto;}
.hiit-round-check.done{background:var(--red-dim);border-color:var(--red);}

/* ===== FREIE TAGE ===== */
.free-days-section{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;}
.free-days-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;}
.free-day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;}
.free-day-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.free-day-label{font-size:12px;font-weight:500;color:var(--muted2);}
.free-day-fields{display:flex;flex-direction:column;gap:7px;}
.free-day-row{display:flex;gap:7px;}
.free-day-row select,.free-day-row input{font-size:12px;padding:7px 9px;}

/* ===== TAGES-LOG ===== */
.tageslog-section{margin-top:14px;}
.tageslog-toggle-btn{width:100%;padding:10px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;text-align:left;display:flex;justify-content:space-between;align-items:center;}
.tageslog-body{display:none;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:12px;}
.tageslog-body.open{display:block;}
.tl-section{margin-bottom:14px;}
.tl-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;display:block;}
.tl-label-editable{border:none;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.07em;padding:0;width:100%;margin-bottom:6px;}
.tl-label-editable:focus{outline:none;color:var(--accent);}
.scale-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.scale-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;transition:all .15s;}
.scale-btn.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.scale-hint{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px;font-family:'DM Mono',monospace;}
.sleep-row{display:flex;gap:8px;align-items:center;}
.sleep-row input{flex:0 0 80px;}
.sleep-row span{font-size:12px;color:var(--muted);}

/* ===== LOGBUCH VIEW ===== */
#view-log{padding:14px 16px;}
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.log-header h2{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;}
.export-btn{font-family:'DM Mono',monospace;font-size:11px;padding:6px 13px;border-radius:20px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);}
.log-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 20px;line-height:1.7;}
.log-week{margin-bottom:20px;}
.log-week-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.log-day{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.log-day-header{padding:9px 13px;background:var(--surface2);font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center;}
.log-day-pct{font-size:11px;color:var(--muted);}
.log-exercise{padding:7px 13px;border-top:1px solid var(--border);}
.log-ex-name{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;}
.log-sets{display:flex;flex-wrap:wrap;gap:5px;}
.log-set-pill{font-family:'DM Mono',monospace;font-size:11px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}
.log-set-pill.has-weight{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
.log-set-pill.done-only{border-color:#444;color:#888;}

/* ===== MENTAL VIEW ===== */
#view-mental{padding:14px 16px;}
.mental-header{margin-bottom:16px;}
.mental-header h2{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--purple);}
.mental-header p{font-size:12px;color:var(--muted);margin-top:3px;}
.mental-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.mental-section-header{padding:12px 14px;background:var(--surface2);display:flex;align-items:center;gap:8px;cursor:pointer;}
.mental-section-icon{font-size:16px;}
.mental-section-title{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--text);}
.mental-section-toggle{margin-left:auto;font-size:16px;color:var(--muted);transition:transform .2s;}
.mental-section-toggle.open{transform:rotate(180deg);}
.mental-body{display:none;padding:14px;}
.mental-body.open{display:block;}
.mental-item{margin-bottom:14px;}
.mental-item-label{font-size:12px;color:var(--muted);margin-bottom:5px;line-height:1.4;}
.mental-check-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.mental-check-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--purple-border);background:transparent;color:var(--purple);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.mental-check-btn:active{transform:scale(.88);}
.mental-check-btn.done{background:var(--purple-dim);border-color:var(--purple);}
.mental-timer-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--purple-border);background:transparent;color:var(--purple);font-family:'DM Mono',monospace;font-size:12px;}
.mental-timer-btn.running{background:var(--purple-dim);}
.mental-timer-disp{font-family:'DM Mono',monospace;font-size:16px;color:var(--purple);margin-left:8px;}
.affirmation-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.affirmation-chip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s;}
.affirmation-chip.sel{border-color:var(--purple);color:var(--purple);background:var(--purple-dim);}
/* SOS */
.sos-section{background:var(--red-dim);border:1px solid var(--red-border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.sos-header{padding:12px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.sos-title{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--red);}
.sos-body{display:none;padding:14px;}
.sos-body.open{display:block;}
.sos-item{background:rgba(255,107,107,0.06);border:1px solid var(--red-border);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;}

.sos-item-desc{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5;}
.sos-log-entry{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px;}


/* ===== BADGES ===== */
.badge-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.badge{font-size:22px;opacity:0.2;transition:all .4s;filter:grayscale(1);}
.badge.earned{opacity:1;filter:grayscale(0);animation:badgePop .4s ease;}
@keyframes badgePop{0%{transform:scale(0.5);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
.badge-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center;margin-top:2px;}
.badge-wrap{display:flex;flex-direction:column;align-items:center;}


/* ===== MENTAL TAB – DATUM / STREAK / KURVE ===== */
.mental-date-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);}
.mental-date-bar input[type="date"]{flex:1;font-family:"DM Mono",monospace;font-size:13px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:7px 10px;}
.mental-date-nav{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mental-date-nav:active{background:var(--surface2);}
.mental-today-btn{font-family:"DM Mono",monospace;font-size:11px;padding:6px 12px;border-radius:20px;border:1px solid var(--purple-border);background:transparent;color:var(--purple);}
.mental-streak-wrap{padding:12px 16px 6px;}
.mental-streak-label{font-family:"DM Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
.mental-streak-row{display:flex;gap:6px;}
.mental-streak-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.mental-streak-dot{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .3s;}
.mental-streak-dot.filled{background:var(--purple-dim);border-color:var(--purple);}
.mental-streak-dot.today{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim);}
.mental-streak-dot.partial{background:rgba(176,96,240,0.05);border-color:rgba(176,96,240,0.4);}
.mental-streak-dname{font-family:"DM Mono",monospace;font-size:9px;color:var(--muted);}
.mental-chart-wrap{padding:6px 16px 12px;border-bottom:1px solid var(--border);}
.mental-curve-labels{display:flex;justify-content:space-between;margin-top:4px;}
.mental-curve-labels span{font-family:"DM Mono",monospace;font-size:9px;color:var(--muted);}
#mental-content{padding:0 16px 20px;}
.mental-header{padding:14px 16px 8px;}

.mental-header p{font-size:12px;color:var(--muted);margin-top:3px;}
/* Badge CSS */
.badge-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;padding:0 16px 8px;}
.badge-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}

.badge-label{font-family:"DM Mono",monospace;font-size:9px;color:var(--muted);text-align:center;}


/* ===== ÜBUNGS-INFO POPUP ===== */
.info-btn{background:transparent;border:none;color:var(--muted);font-size:14px;padding:2px 4px;cursor:pointer;flex-shrink:0;transition:color .2s;line-height:1;}
.info-btn:active{color:var(--accent);}
.exercise-name-row{display:flex;align-items:center;gap:4px;}

.info-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:flex-end;justify-content:center;}
.info-overlay.open{display:flex;}

.info-sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.info-sheet-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:4px;}
.info-sheet-pattern{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.info-sheet-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px;}

.info-close-btn{display:block;width:100%;margin-top:14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);font-size:13px;font-family:'DM Mono',monospace;text-align:center;cursor:pointer;}


/* ===== EDITIERBARE FELDER ===== */
[contenteditable="true"]:focus{outline:1px dashed var(--accent);border-radius:3px;padding:1px 3px;}

/* ===== PRINT ===== */
@media print{

}

const wuCardioDevk  = (wi,di) => `tp3_w${wi}d${di}_wu_dev`;
const wuCardioZeitk = (wi,di) => `tp3_w${wi}d${di}_wu_zeit`;
const wuCardioDistk = (wi,di) => `tp3_w${wi}d${di}_wu_dist`;
const wuCardioDonk  = (wi,di) => `tp3_w${wi}d${di}_wu_done`;
const wuExtrak      = (wi,di) => `tp3_w${wi}d${di}_wu_extra`;

// Splittet Warmup-String in Cardio-Teil und Extra-Teil
function parseWarmup(warmupStr){
  const plusIdx = warmupStr.indexOf(' + ');
  if(plusIdx===-1) return {cardio:warmupStr, extra:null};
  return {cardio:warmupStr.substring(0,plusIdx).trim(), extra:warmupStr.substring(plusIdx+3).trim()};
}

function renderWarmupCard(wi,di,warmupStr){
  const DEVICES=['Rudergerät','Laufband','Ski-Erg','Fahrrad / Bike','Crosstrainer','Sonstiges'];
  const parsed    = parseWarmup(warmupStr);
  const savedDev  = lv(wuCardioDevk(wi,di))  || 'Rudergerät';
  const savedZeit = lv(wuCardioZeitk(wi,di));
  const savedDist = lv(wuCardioDistk(wi,di));
  const cardioDone= lb(wuCardioDonk(wi,di));
  const extraDone = lb(wuExtrak(wi,di));

  let html=`<div class="warmup-card">
    <div class="warmup-top"><span class="card-label">Aufwärmen</span></div>
    <div class="warmup-cardio-row">
      <select id="wudev-${wi}-${di}" onchange="sv(wuCardioDevk(${wi},${di}),this.value)">
        ${DEVICES.map(d=>`<option${savedDev===d?' selected':''}>${d}</option>`).join('')}
      </select>
      <input type="number" inputmode="decimal" min="0" step="1" placeholder="Min."
        value="${savedZeit}" title="Dauer in Minuten"
        onchange="sv(wuCardioZeitk(${wi},${di}),this.value)" onfocus="this.select()">
      <span class="wunit">Min.</span>
      <input type="number" inputmode="decimal" min="0" step="0.01" placeholder="km"
        value="${savedDist}" title="Distanz in km"
        onchange="sv(wuCardioDistk(${wi},${di}),this.value)" onfocus="this.select()">
      <span class="wunit">km</span>
      <button class="warmup-cardio-check${cardioDone?' done':''}" id="wucardiobtn-${wi}-${di}"
        onclick="toggleWuCardio(${wi},${di})">${cardioDone?'✓':'○'}</button>
    </div>`;

  if(parsed.extra){
    html+=`<div class="warmup-extra-row">
      <button class="warmup-extra-check${extraDone?' done':''}" id="wuextrabtn-${wi}-${di}"
        onclick="toggleWuExtra(${wi},${di})">${extraDone?'✓':'○'}</button>
      <span class="warmup-extra-text">${parsed.extra}</span>
    </div>`;
  }
  html+=`</div>`;
  return html;
}

function toggleWuCardio(wi,di){
  const k=wuCardioDonk(wi,di); const nv=!lb(k); sb(k,nv);
  const btn=document.getElementById(`wucardiobtn-${wi}-${di}`);
  if(btn){btn.className='warmup-cardio-check'+(nv?' done':'');btn.textContent=nv?'✓':'○';}
  checkDayDone(wi,di); updateGlobalProgress();
}

function toggleWuExtra(wi,di){
  const k=wuExtrak(wi,di); const nv=!lb(k); sb(k,nv);
  const btn=document.getElementById(`wuextrabtn-${wi}-${di}`);
  if(btn){btn.className='warmup-extra-check'+(nv?' done':'');btn.textContent=nv?'✓':'○';}
  checkDayDone(wi,di); updateGlobalProgress();
}

const exNameKey   = (wi,di,ei) => `tp3_w${wi}d${di}e${ei}_customname`;
const exDetailKey = (wi,di,ei) => `tp3_w${wi}d${di}e${ei}_customdetail`;

function saveExName(wi, di, ei, val){
  if(val && val.trim()) sv(exNameKey(wi,di,ei), val.trim());
}
function saveExDetail(wi, di, ei, val){
  if(val && val.trim()) sv(exDetailKey(wi,di,ei), val.trim());
}

// =====================================================
function countDayChecks(wi,di){
  const day=DATA[wi].days[di];
  let total=0,done=0;
  // Aufwärmen Cardio
  total++; if(lb(wuCardioDonk(wi,di)))done++;
  // Aufwärmen Extra (nur wenn vorhanden)
  const parsed=parseWarmup(day.warmup);
  if(parsed.extra){total++;if(lb(wuExtrak(wi,di)))done++;}
  // Übungen
  day.exercises.forEach((ex,ei)=>{
    for(let si=0;si<ex.sets;si++){total++;if(lb(sk(wi,di,ei,si)))done++;}
  });
  // Finisher
  total++;if(lb(fk(wi,di)))done++;
  // Stretching
  day.stretch.forEach((_,sti)=>{total++;if(lb(stk(wi,di,sti)))done++;});
  return{total,done};
}

function updateGlobalProgress(){
  let t=0,d=0;
  DATA.forEach((_,wi)=>DATA[wi].days.forEach((_,di)=>{const c=countDayChecks(wi,di);t+=c.total;d+=c.done;}));
  const p=t?Math.round(d/t*100):0;
  document.getElementById('global-bar').style.width=p+'%';
  document.getElementById('global-progress-text').textContent=`${d} von ${t} Einheiten · ${p}% Block 1`;
}

// =====================================================
// GEWICHT-FORTSCHRITT (Vergleich zu Woche 1)
// =====================================================
function getProgressIndicator(wi,di,ei){
  if(wi===0)return'';
  // Suche erstes gespeichertes Gewicht in Woche 1 für diese Übungsposition
  const firstWt=lv(wk(0,di,ei,0));
  const curWt=lv(wk(wi,di,ei,0));
  if(!firstWt||!curWt)return'';
  const diff=(parseFloat(curWt)-parseFloat(firstWt)).toFixed(1);
  if(diff==0)return'';
  const sign=diff>0?'+':'';
  return`<div class="progress-indicator">${sign}${diff} kg seit Wo.1</div>`;
}

function renderHiit(wi,w){

  const savedDev=lv(hiitdevk(wi))||'Rudergerät';
  let html=`<div class="day-content${curDay[wi]===99?' active':''}" id="dc-${wi}-99">`;
  html+=`<div class="day-date-header"><span class="day-date-label">HIIT</span></div>`;
  if(isOpt)html+=`<div class="hiit-note-optional">⚡ Optional diese Woche – nur wenn du dich gut fühlst und erholt bist.</div>`;
  html+=`<div class="hiit-section">
    <span class="card-label">Gerät wählen</span>
    <div class="hiit-device-row">
      <select onchange="sv(hiitdevk(${wi}),this.value)" id="hiitdev-${wi}">
        ${['Rudergerät','Laufband','Fahrrad / Bike','Ski-Erg','Sonstiges'].map(o=>`<option${savedDev===o?' selected':''}>${o}</option>`).join('')}
      </select>
    </div>
    <span class="card-label">3 × 30 Sek. Power On · volle Erholung dazwischen</span>`;

  for(let ri=0;ri<3;ri++){
    const done=lb(hiitk(wi,ri));
    const intVal=lv(hiitintk(wi,ri));
    const ntVal=lv(hiitnk(wi,ri));
    html+=`<div class="hiit-round">
      <div class="hiit-round-header">
        <span class="hiit-round-num">Runde ${ri+1}</span>
        <button class="hiit-timer-btn" id="hiittbtn-${wi}-${ri}" onclick="startHiitTimer(${wi},${ri})">▶ 30 Sek.</button>
        <span class="hiit-timer-display" id="hiittdisp-${wi}-${ri}"></span>
        <button class="hiit-round-check${done?' done':''}" id="hiitrchk-${wi}-${ri}" onclick="toggleHiitRound(${wi},${ri})">${done?'✓':'○'}</button>
      </div>
      <div class="hiit-round-fields">
        <input type="text" placeholder="Intensität / Widerstand…" value="${intVal}" onchange="sv(hiitintk(${wi},${ri}),this.value)" style="flex:1">
        <input type="text" placeholder="Notiz…" value="${ntVal}" onchange="sv(hiitnk(${wi},${ri}),this.value)" style="flex:1">
      </div>
    </div>`;
  }
  html+=`</div></div>`;
  return html;
}

// HIIT Timer
function startHiitTimer(wi,ri){
  const key=`${wi}-${ri}`;
  if(hiitTimers[key])return;
  let secs=30;
  const btn=document.getElementById(`hiittbtn-${wi}-${ri}`);
  const disp=document.getElementById(`hiittdisp-${wi}-${ri}`);
  btn.classList.add('running');
  btn.textContent='…';
  hiitTimers[key]=setInterval(()=>{
    disp.textContent=secs+'s';
    if(secs<=0){
      clearInterval(hiitTimers[key]);delete hiitTimers[key];
      btn.classList.remove('running');btn.textContent='✓ Done';
      disp.textContent='';
      if(navigator.vibrate)navigator.vibrate([200,100,200]);
    }
    secs--;
  },1000);
}

function toggleHiitRound(wi,ri){
  const k=hiitk(wi,ri);const nv=!lb(k);sb(k,nv);
  const btn=document.getElementById(`hiitrchk-${wi}-${ri}`);
  if(btn){btn.className='hiit-round-check'+(nv?' done':'');btn.textContent=nv?'✓':'○';}
}

// =====================================================
// TAGES-LOG RENDERN
// =====================================================
function renderTagesLog(wi,di){
  const fields=[
    {key:'ernaehrung',label:'Ernährung heute',type:'textarea'},
    {key:'supplements',label:'Supplements / NEMs heute',type:'textarea'},
    {key:'aktivitaeten',label:'Weitere Aktivitäten heute',type:'textarea'},
  ];
  const energyVal=parseInt(lv(tlk(wi,di,'energie')))||0;
  const schlafH=lv(tlk(wi,di,'schlafh'));
  const schlafQ=parseInt(lv(tlk(wi,di,'schlafq')))||0;

  let html=`<div class="tageslog-section">
    <button class="tageslog-toggle-btn" data-wi="${wi}" data-di="${di}" onclick="toggleTagesLogBtn(this)">
      <span>📋 Tages-Log</span><span class="tltogarrow">▾</span>
    </button>
    <div class="tageslog-body" id="tlbody-${wi}-${di}">`;

  // Körpergefühl Skala 1-10
  html+=`<div class="tl-section">
    <input class="tl-label-editable" type="text" value="${lv(tlhk(wi,di,'energie'))||'Körpergefühl & Energie'}"
      onchange="sv(tlhk(${wi},${di},'energie'),this.value)">
    <div class="scale-hint"><span>1 = erschöpft</span><span>10 = voller Energie</span></div>
    <div class="scale-row">`;
  for(let i=1;i<=10;i++){
    html+=`<button class="scale-btn${energyVal===i?' sel':''} scale-group-energie" data-val="${i}" onclick="setScale(${wi},${di},'energie',${i})">${i}</button>`;
  }
  html+=`</div></div>`;

  // Schlaf
  html+=`<div class="tl-section">
    <span class="tl-label">Schlaf letzte Nacht</span>
    <div class="sleep-row">
      <input type="number" inputmode="decimal" step="0.5" min="0" max="16" placeholder="h" value="${schlafH}"
        onchange="sv(tlk(${wi},${di},'schlafh'),this.value)" style="flex:0 0 70px">
      <span>Std.</span>
    </div>
    <div class="scale-hint" style="margin-top:6px"><span>Qualität: 1 = schlecht</span><span>5 = traumhaft</span></div>
    <div class="scale-row" style="margin-top:4px">`;
  for(let i=1;i<=5;i++){
    html+=`<button class="scale-btn${schlafQ===i?' sel':''} scale-group-schlafq" data-val="${i}" onclick="setScale(${wi},${di},'schlafq',${i})">${i}</button>`;
  }
  html+=`</div></div>`;

  // Texfelder
  fields.forEach(f=>{
    const val=lv(tlk(wi,di,f.key));
    const head=lv(tlhk(wi,di,f.key))||f.label;
    html+=`<div class="tl-section">
      <input class="tl-label-editable" type="text" value="${head}"
        onchange="sv(tlhk(${wi},${di},'${f.key}'),this.value)">
      <textarea placeholder="…" onchange="sv(tlk(${wi},${di},'${f.key}'),this.value)">${val}</textarea>
    </div>`;
  });
  html+=`</div></div>`;
  return html;
}

function toggleTagesLog(wi,di){
  const body=document.getElementById(`tlbody-${wi}-${di}`);
  if(!body) return;
  const btn=body.previousElementSibling;
  const arr=btn ? btn.querySelector('.tltogarrow') : null;
  const open=body.classList.toggle('open');
  if(arr) arr.textContent=open?'▴':'▾';
}

function toggleTagesLogBtn(btn){
  const wi=btn.dataset.wi;
  const di=btn.dataset.di;
  const body=document.getElementById(`tlbody-${wi}-${di}`);
  if(!body) return;
  const arr=btn.querySelector('.tltogarrow');
  const open=body.classList.toggle('open');
  if(arr) arr.textContent=open?'▴':'▾';
}

function setScale(wi,di,field,val){
  sv(tlk(wi,di,field),val);
  // Nur die Buttons dieser Skala aktualisieren, kein Re-render
  const body=document.getElementById(`tlbody-${wi}-${di}`);
  if(!body)return;
  const groups=body.querySelectorAll(`.scale-group-${field}`);
  groups.forEach(btn=>{
    const bval=parseInt(btn.dataset.val);
    btn.classList.toggle('sel',bval===val);
  });
}

// =====================================================
function switchDay(wi,di){
  curDay[wi]=di;
  // Alle Tabs deaktivieren, aktiven markieren
  const allTabs=document.querySelectorAll(`#dtabs-${wi} .day-tab`);
  allTabs.forEach((t,i)=>{
    const tabDi=[0,1,2,3,99,200,201,202][i];
    t.classList.toggle('active',tabDi===di);
    // Teal-Farbe für freie Tabs
    if(tabDi>=200){
      t.style.color=(tabDi===di)?'var(--teal)':'var(--muted)';
    }
  });
  // Alle Contents ausblenden, aktiven einblenden
  document.querySelectorAll(`[id^="dc-${wi}-"]`).forEach(el=>el.classList.remove('active'));
  const dc=document.getElementById(`dc-${wi}-${di}`);if(dc)dc.classList.add('active');
}

  const k=sk(wi,di,ei,si);const nv=!lb(k);sb(k,nv);
  const btn=document.getElementById(`sb-${wi}-${di}-${ei}-${si}`);
  if(btn){btn.className='set-btn'+(nv?' done':'');btn.textContent=nv?'✓':'○';}

  const card=document.getElementById(`exc-${wi}-${di}-${ei}`);if(card)card.classList.toggle('completed',allDone);
  checkDayDone(wi,di);updateGlobalProgress();renderWeekNav();
}

function checkDayDone(wi,di){
  const{total,done}=countDayChecks(wi,di);const allDone=done===total;
  const banner=document.getElementById(`ddb-${wi}-${di}`);if(banner)banner.classList.toggle('show',allDone);
  const tabs=document.querySelectorAll(`#dtabs-${wi} .day-tab`);
  if(tabs[di])tabs[di].classList.toggle('done',allDone);
}

function resetDay(wi,di){
  const day=DATA[wi].days[di];
  day.exercises.forEach((ex,ei)=>{
    for(let si=0;si<ex.sets;si++){sb(sk(wi,di,ei,si),false);}
  });
  sb(fk(wi,di),false);
  day.stretch.forEach((_,sti)=>sb(stk(wi,di,sti),false));
  renderWeek();updateGlobalProgress();
}

function renderLog(){
  const container=document.getElementById('log-content');container.innerHTML='';
  let hasData=false;
  DATA.forEach((w,wi)=>{
    let weekHtml='';let weekHasData=false;
    w.days.forEach((d,di)=>{
      const{total,done}=countDayChecks(wi,di);
      if(done===0)return;
      weekHasData=true;hasData=true;
      const pct=Math.round(done/total*100);
      const savedDate=lv(datek(wi,di));
      const dateStr=savedDate?` · ${new Date(savedDate).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})}`:'' ;
      const wuDone=lb(wuCardioDonk(wi,di));
      const wuDev=lv(wuCardioDevk(wi,di))||'Rudergerät';
      const wuZeit=lv(wuCardioZeitk(wi,di));
      const wuDist=lv(wuCardioDistk(wi,di));
      weekHtml+=`<div class="log-day">
        <div class="log-day-header"><span>${d.label}${dateStr}</span><span class="log-day-pct">${pct}%</span></div>`;
      if(wuDone||wuZeit||wuDist){
        weekHtml+=`<div class="log-exercise" style="background:var(--blue-dim)"><div class="log-ex-name" style="color:var(--blue)">🚣 Aufwärmen: ${wuDev}${wuZeit?' · '+wuZeit+' Min.':''}${wuDist?' · '+wuDist+' km':''}</div></div>`;
      }
      d.exercises.forEach((ex,ei)=>{
        const sets=[];let anyDone=false;
        for(let si=0;si<ex.sets;si++){
          const done=lb(sk(wi,di,ei,si));
          const wt=lv(wk(wi,di,ei,si));
          const nt=lv(nk(wi,di,ei,si));
          if(done||wt||nt)anyDone=true;
          if(done||wt){
            let label=`S${si+1}`;
            if(wt)label+=` · ${wt}kg`;
            if(nt)label+=` · ${nt}`;
            sets.push({label,hasWeight:!!wt,done});
          }
        }
        if(!anyDone)return;
        weekHtml+=`<div class="log-exercise"><div class="log-ex-name">${ex.name}</div><div class="log-sets">`;
        sets.forEach(s=>{
          weekHtml+=`<span class="log-set-pill ${s.hasWeight?'has-weight':s.done?'done-only':''}">${s.label}</span>`;
        });
        weekHtml+=`</div></div>`;
      });
      // Finisher
      const finDone=lb(fk(wi,di));
      const finWt=lv(fwk(wi,di));
      if(finDone||finWt){
        weekHtml+=`<div class="log-exercise"><div class="log-ex-name" style="color:var(--accent)">✓ ${d.finisher}${finWt?' · '+finWt+'kg':''}</div></div>`;
      }
      // Tages-Log Felder
      const energie=lv(tlk(wi,di,'energie'));
      const schlafH=lv(tlk(wi,di,'schlafh'));
      if(energie||schlafH){
        weekHtml+=`<div class="log-exercise" style="font-size:11px;color:var(--muted)">`;
        if(energie)weekHtml+=`Energie: ${energie}/10 `;
        if(schlafH)weekHtml+=`· Schlaf: ${schlafH}h`;
        weekHtml+=`</div>`;
      }
      weekHtml+=`</div>`;
    });
    if(weekHasData){
      container.innerHTML+=`<div class="log-week"><div class="log-week-title">Woche ${w.week} · ${w.dates}</div>${weekHtml}</div>`;
    }
  });
  if(!hasData)container.innerHTML=`<div class="log-empty">Noch keine Trainings abgehakt.<br>Hake Sätze im Training ab – sie erscheinen hier.</div>`;
}

// Ton-Signal am Ende von Timern (Web Audio API – kein externes File nötig)
function playDoneSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const notes=[523,659,784]; // C5, E5, G5 – aufsteigender Akkord
    notes.forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value=freq;
      osc.type='sine';
      const start=ctx.currentTime+i*0.25;
      gain.gain.setValueAtTime(0,start);
      gain.gain.linearRampToValueAtTime(0.4,start+0.05);
      gain.gain.linearRampToValueAtTime(0,start+0.4);
      osc.start(start);
      osc.stop(start+0.5);
    });
  }catch(e){}
}

// Datumsformat YYYY-MM-DD
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function dateLabel(str){
  const d=new Date(str+'T12:00:00');
  return d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'});
}
function getLast14Days(){
  const days=[];
  for(let i=13;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}
function getLast7Days(){
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    days.push(d.toISOString().split('T')[0]);
  }
  return days;
}

// State keys für Mental (tagesgebunden)
const mmk=(date,field)=>`tp3_mental_${date}_${field}`;

// Berechne Mental-Score für einen Tag (0-100)
function getMentalScore(date){
  const checks=['atem_morgen','powerposen','anerkennung','atem_abend'];
  const texts=['fokus','warum','gut','dank1'];
  let score=0;
  checks.forEach(k=>{ if(lb(mmk(date,k))) score+=15; });
  texts.forEach(k=>{ if(lv(mmk(date,k)).length>2) score+=10; });
  return Math.min(score,100);
}

function shiftMentalDate(delta){
  const d=new Date(mentalDate+'T12:00:00');
  d.setDate(d.getDate()+delta);
  mentalDate=d.toISOString().split('T')[0];
  renderMental();
}

function saveMentalScale(date,field,val){
  sv(mmk(date,field),val);
  // Nur die betroffenen Buttons aktualisieren
  document.querySelectorAll(`[data-date="${date}"][data-field="${field}"]`).forEach(btn=>{
    const bval=parseInt(btn.dataset.val);
    const active=bval===val;
    const isEnergy=field==='energie';
    const isSchlaf=field==='schlafq';
    if(isEnergy){
      btn.style.borderColor=active?'var(--accent)':'var(--border)';
      btn.style.background=active?'var(--accent-dim)':'transparent';
      btn.style.color=active?'var(--accent)':'var(--muted)';
    } else if(isSchlaf){
      btn.style.borderColor=active?'var(--blue)':'var(--border)';
      btn.style.background=active?'var(--blue-dim)':'transparent';
      btn.style.color=active?'var(--blue)':'var(--muted)';
    }
  });
  updateMentalScoreRing(date);
}

function toggleMentalCheckDate(k,date,field){
  const nv=!lb(k); sb(k,nv);
  // Nur den Button aktualisieren – kein Re-render, Sektion bleibt offen
  const btn=document.getElementById(`mchk-${date}-${field}`);
  if(btn){btn.className='mental-check-btn'+(nv?' done':'');btn.textContent=nv?'✓':'○';}
  // Score-Ring aktualisieren ohne alles neu aufzubauen
  updateMentalScoreRing(date);
}

function updateMentalScoreRing(date){
  const score=getMentalScore(date);
  // Score-Zahl
  const numEl=document.getElementById('mental-score-num');
  if(numEl) numEl.textContent=score;
  // SVG Ring
  const ringEl=document.getElementById('mental-score-ring');
  if(ringEl) ringEl.setAttribute('stroke-dasharray',`${score},100`);
}

function selectAffirmationDate(k,el,text){
  sv(k,text);
  el.closest('.affirmation-list').querySelectorAll('.affirmation-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  const input=el.closest('.mental-item').querySelector('input[type="text"]');
  if(input)input.value=text;
}


function stopMentalTimer(date, field){
  const timerKey = `${date}-${field}`;
  if(mentalTimers[timerKey]){
    clearInterval(mentalTimers[timerKey]);
    delete mentalTimers[timerKey];
  }
  const btn  = document.getElementById(`mentimer-${timerKey}`);
  const disp = document.getElementById(`mentdisp-${timerKey}`);
  if(btn) { btn.classList.remove('running'); btn.textContent='▶ Start'; }
  if(disp) disp.textContent='';
}

function startMentalTimerDate(date,field,dur){
  const timerKey=`${date}-${field}`;
  if(mentalTimers[timerKey])return;
  let secs=dur;
  const btn=document.getElementById(`mentimer-${timerKey}`);
  const disp=document.getElementById(`mentdisp-${timerKey}`);
  if(btn)btn.classList.add('running');
  mentalTimers[timerKey]=setInterval(()=>{
    const m=Math.floor(secs/60),s=secs%60;
    if(disp)disp.textContent=`${m}:${String(s).padStart(2,'0')}`;
    if(secs<=0){
      clearInterval(mentalTimers[timerKey]);delete mentalTimers[timerKey];
      if(btn){btn.classList.remove('running');btn.textContent='✓ Fertig';}
      if(disp)disp.textContent='';
      sb(mmk(date,field+'_done'),true);
      playDoneSound();
      if(navigator.vibrate)navigator.vibrate([300,150,300,150,300]);
      renderMental();
    }
    secs--;
  },1000);
}

// 4-7-8 Atemtechnik mit Live-Phasen-Anzeige
function start478Timer(){
  const btn=document.getElementById('mentimer-478');
  const disp=document.getElementById('mentdisp-478');
  if(!btn||btn.classList.contains('running')) return;
  btn.classList.add('running');
  btn.textContent='läuft…';
  const phases=[
    {label:'Einatmen',dur:4},{label:'Halten',dur:7},{label:'Ausatmen',dur:8},
    {label:'Einatmen',dur:4},{label:'Halten',dur:7},{label:'Ausatmen',dur:8},
    {label:'Einatmen',dur:4},{label:'Halten',dur:7},{label:'Ausatmen',dur:8},
  ];
  let pi=0, secs=phases[0].dur;
  if(disp) disp.textContent=phases[0].label+' '+secs;
  const t=setInterval(()=>{
    secs--;
    if(secs<=0){
      pi++;
      if(pi>=phases.length){
        clearInterval(t);
        btn.classList.remove('running');
        btn.textContent='✓ Fertig';
        if(disp) disp.textContent='';
        playDoneSound();
        if(navigator.vibrate) navigator.vibrate([300,150,300,150,300]);
        return;
      }
      secs=phases[pi].dur;
    }
    if(disp) disp.textContent=phases[pi].label+' '+secs;
  },1000);
}

// Generischer Mental-Timer (für SOS Kurz-Bewegung etc.)
function startMentalTimer(timerKey,dur,doneKey,btnId){
  if(mentalTimers[timerKey]) return;
  let secs=dur;
  const btn=document.getElementById(`mentimer-${timerKey}`);
  const disp=document.getElementById(`mentdisp-${timerKey}`);
  if(btn) btn.classList.add('running');
  mentalTimers[timerKey]=setInterval(()=>{
    const m=Math.floor(secs/60), s=secs%60;
    if(disp) disp.textContent=`${m}:${String(s).padStart(2,'0')}`;
    if(secs<=0){
      clearInterval(mentalTimers[timerKey]);
      delete mentalTimers[timerKey];
      if(btn){btn.classList.remove('running');btn.textContent='✓ Fertig';}
      if(disp) disp.textContent='';
      if(doneKey) sb(doneKey,true);
      if(btnId){
        const chk=document.getElementById(`mchk-${btnId}`);
        if(chk){chk.className='mental-check-btn done';chk.textContent='✓';}
      }
      if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
    }
    secs--;
  },1000);
}

// Generiert YouTube-Suche-URL für unbekannte Übungen
function getYouTubeUrl(exerciseName){
  if(EXERCISE_DB[exerciseName] && EXERCISE_DB[exerciseName].ytUrl){
    return EXERCISE_DB[exerciseName].ytUrl;
  }
  const query = encodeURIComponent(exerciseName + ' Übung Tutorial Technik Deutsch');
  return `https://www.youtube.com/results?search_query=${query}`;
}

function showExerciseInfo(exerciseName, pattern){
  const db = EXERCISE_DB[exerciseName];
  document.getElementById('info-pattern').textContent = pattern;
  document.getElementById('info-title').textContent = exerciseName;

  if(db){
    document.getElementById('info-desc').textContent = db.desc;
    const muscleHtml = db.muscles.map(m=>`<span class="muscle-tag">${m}</span>`).join('');
    document.getElementById('info-muscles').innerHTML = muscleHtml;
  } else {
    document.getElementById('info-desc').textContent = 'Keine Beschreibung verfügbar. Sieh dir das Tutorial auf YouTube an.';
    document.getElementById('info-muscles').innerHTML = '';
  }

  const ytUrl = getYouTubeUrl(exerciseName);
  document.getElementById('info-links').innerHTML = `
    <a class="yt-link" href="${ytUrl}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z"/><polygon fill="white" points="9.7 15.5 15.8 12 9.7 8.5"/></svg>
      Tutorial auf YouTube ansehen
    </a>`;

  document.getElementById('info-overlay').classList.add('open');
}

function closeInfoSheet(e){
  if(e.target === document.getElementById('info-overlay')){
    document.getElementById('info-overlay').classList.remove('open');
  }
}

// Event delegation für Info-Buttons und Stretch-Info-Buttons
document.addEventListener('click', function(e){
  // Mental Skalen-Buttons (Energie & Schlaf)
  const scaleBtn = e.target.closest('.mental-scale-btn');
  if(scaleBtn){
    const date  = scaleBtn.dataset.date;
    const field = scaleBtn.dataset.field;
    const val   = parseInt(scaleBtn.dataset.val);
    if(date && field && val) saveMentalScale(date, field, val);
    return;
  }
  const btn = e.target.closest('.info-btn');
  if(btn){
    if(btn.dataset.exname){
      showExerciseInfo(btn.dataset.exname, btn.dataset.expat || '');
    } else if(btn.dataset.stretchname){
      showStretchInfo(btn.dataset.stretchname);
    }
  }
});
